<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#206bc4" />
    <title>Offline · PrepMind</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { display: grid; min-height: 100vh; min-height: 100dvh; place-items: center; margin: 0; padding: 24px; color: #182433; background: #f4f4f5; }
      main { width: min(100%, 420px); padding: 32px; text-align: center; background: #fff; border: 1px solid #dce1e7; border-radius: 12px; box-shadow: 0 12px 32px rgba(24, 36, 51, 0.08); }
      img { width: 72px; height: 72px; border-radius: 16px; }
      h1 { margin: 22px 0 8px; font-size: 24px; letter-spacing: -0.4px; }
      p { margin: 0 0 24px; color: #667382; line-height: 1.6; }
      button { min-height: 42px; padding: 0 18px; color: #fff; font: inherit; font-weight: 600; background: #206bc4; border: 0; border-radius: 6px; cursor: pointer; }
      button:focus-visible { outline: 3px solid rgba(32, 107, 196, 0.3); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <h1>You’re offline</h1>
      <p>PrepMind needs a connection to load your study data. Reconnect, then try again.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
